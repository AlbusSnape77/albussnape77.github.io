<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Homepage</title>
  <meta name="description" content="A cozy little corner of the internet — about me, my GitHub, and the things I make." />

  <!-- Rounded + handwritten fonts give it that warm, hand-made anime feel (not a corporate sans) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Yusei+Magic&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎸</text></svg>" />
</head>
<body>
  <!-- Opening effect: a music note pops with sparkles, then lifts to reveal the page -->
  <div class="splash" id="splash" aria-hidden="true">
    <span class="splash-spark sp1">✦</span>
    <span class="splash-spark sp2">✧</span>
    <span class="splash-spark sp3">✦</span>
    <span class="splash-spark sp4">✧</span>
    <div class="splash-mark">♪</div>
    <div class="splash-sub">ようこそ</div>
  </div>

  <!-- Soft dawn sky + drifting clouds -->
  <div class="bg-sky" aria-hidden="true">
    <span class="cloud cloud-1"></span>
    <span class="cloud cloud-2"></span>
    <span class="cloud cloud-3"></span>
    <span class="hill"></span>
  </div>

  <!-- Music notes & petals floating up (filled by app.js) -->
  <div class="notes" id="notes" aria-hidden="true"></div>

  <!-- Danmaku: gentle quotes drifting across (filled by app.js) -->
  <div class="floating-words" id="floatingWords" aria-hidden="true"></div>

  <!-- Top bar: cute tabs + language toggle -->
  <header class="topbar">
    <nav class="nav-pill" id="navPill" aria-label="Primary"></nav>
    <button class="lang-toggle" id="langToggle" type="button" aria-label="Switch language"></button>
  </header>

  <main id="main">
    <section class="view view-home is-active" id="view-home"></section>
    <section class="view view-software" id="view-software"></section>
    <section class="view view-about" id="view-about"></section>
  </main>

  <footer class="site-footer" id="siteFooter"></footer>

  <!-- Chibi 後藤ひとり (CSS art) peeking in the corner — click her to reshuffle colours. -->
  <button class="mascot" id="mascot" type="button" aria-label="後藤ひとり — tap to change colours">
    <span class="bk-bubble">ど、どうも…</span>
    <span class="bocchi">
      <span class="bk-hair-back"></span>
      <span class="bk-ahoge"></span>
      <span class="bk-cube"></span>
      <span class="bk-body"></span>
      <span class="bk-guitar">🎸</span>
      <span class="bk-face">
        <span class="bk-bangs"></span>
        <span class="bk-eye bk-eye-l"></span>
        <span class="bk-eye bk-eye-r"></span>
        <span class="bk-blush bk-blush-l"></span>
        <span class="bk-blush bk-blush-r"></span>
        <span class="bk-mouth"></span>
      </span>
    </span>
  </button>

  <button class="fab fab-top" id="fabTop" type="button" aria-label="Back to top"></button>

  <script src="js/content.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
